# ============================================================
# Add this block INSIDE the existing server { } block in:
#   /etc/nginx/sites-available/default
#
# Place it just before the closing  }  of the server block.
# ============================================================

    # Reverse-proxy all /api/ requests to Flask
    location /api/ {
        proxy_pass         http://127.0.0.1:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
        proxy_read_timeout 30s;
    }

# ============================================================
# The rest of Nginx (serving static files like index.html)
# is already handled by the default root /var/www/html block.
# No other changes needed.
# ============================================================
